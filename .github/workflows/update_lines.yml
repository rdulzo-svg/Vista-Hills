name: Update Fantasy Lines

on:
  schedule:
    # 1 AM ET daily (6 AM UTC) — covers nightly score updates and weekly rollover
    - cron: "0 6 * * *"
  workflow_dispatch:   # allow manual trigger from the GitHub Actions UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Update live lines
        env:
          ESPN_S2:    ${{ secrets.ESPN_S2 }}
          ESPN_SWID:  ${{ secrets.ESPN_SWID }}
        run: python scripts/update_lines.py

      - name: Commit and push if changed
        run: |
          git config user.name  "Vista Hills Bot"
          git config user.email "actions@github.com"
          git add live_data.json
          # Only commit if live_data.json actually changed
          git diff --cached --quiet && echo "No changes." || \
            git commit -m "Auto-update lines [skip ci]" && git push
