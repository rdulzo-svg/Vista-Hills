<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vista Hills — Scoring Consistency (2026)</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      color: #eee;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      padding: 28px 20px 48px;
    }

    .page-header {
      text-align: center;
      margin-bottom: 28px;
    }
    .page-header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: #fff;
    }
    .page-header p {
      margin-top: 6px;
      color: #aaa;
      font-size: 0.92rem;
    }

    .chart-card {
      background: #16213e;
      border-radius: 14px;
      padding: 24px;
      max-width: 800px;
      margin: 0 auto 32px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    .chart-wrapper {
      position: relative;
      width: 100%;
      height: 580px;
    }

    canvas#consistencyChart {
      display: block;
    }

    .controls {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 14px;
    }

    .btn-download {
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 18px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.18s;
    }
    .btn-download:hover { background: #1d4ed8; }

    .note {
      text-align: center;
      color: #888;
      font-size: 0.8rem;
      margin-top: 10px;
      margin-bottom: 28px;
    }

    /* Table */
    .table-card {
      background: #16213e;
      border-radius: 14px;
      padding: 24px;
      max-width: 800px;
      margin: 0 auto;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
      overflow-x: auto;
    }
    .table-card h2 {
      font-size: 1.05rem;
      font-weight: 600;
      margin-bottom: 16px;
      color: #ccc;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
    }
    thead th {
      background: #0f172a;
      color: #94a3b8;
      font-weight: 600;
      padding: 10px 14px;
      text-align: left;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
      border-bottom: 2px solid #1e293b;
      transition: color 0.15s;
    }
    thead th:hover { color: #eee; }
    thead th.sorted { color: #60a5fa; }
    thead th.sorted::after { content: ' ↓'; font-size: 0.75em; }
    thead th.sorted.asc::after { content: ' ↑'; }

    tbody tr { border-bottom: 1px solid #1e2d4a; transition: background 0.12s; }
    tbody tr:hover { background: rgba(255,255,255,0.04); }
    tbody tr:nth-child(even) { background: rgba(255,255,255,0.02); }
    tbody tr:nth-child(even):hover { background: rgba(255,255,255,0.05); }

    td { padding: 9px 14px; }
    td.team-cell { display: flex; align-items: center; gap: 8px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    td.num { text-align: right; font-variant-numeric: tabular-nums; }
    td.cv { text-align: right; color: #94a3b8; }
    a.back-link { color: #557b9d; font-size: 12px; text-decoration: none; margin-bottom: 16px; display: inline-block; }
  a.back-link:hover { color: #60a5fa; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Back to Vista Hills</a>



<div class="page-header">
  <h1>Vista Hills — Scoring Consistency (2026)</h1>
  <p>Average weekly score vs. week-to-week variance &nbsp;|&nbsp; Bubble size = wins</p>
</div>

<div class="chart-card" id="chartCard">
  <div class="controls">
    <button class="btn-download" onclick="downloadPng()">Download PNG</button>
  </div>
  <div class="chart-wrapper">
    <canvas id="consistencyChart"></canvas>
  </div>
</div>

<p class="note">* Week 1 ran 12 days — not normalized. Std dev reflects raw weekly totals.</p>

<div class="table-card">
  <h2>Team Consistency Rankings</h2>
  <table id="rankTable">
    <thead>
      <tr>
        <th data-col="name" data-type="str">Team</th>
        <th data-col="avg"  data-type="num" class="sorted">Avg/Wk</th>
        <th data-col="std"  data-type="num">Std Dev</th>
        <th data-col="cv"   data-type="num">CV %</th>
        <th data-col="wins" data-type="num">Wins</th>
      </tr>
    </thead>
    <tbody id="rankBody"></tbody>
  </table>
</div>

<script>
const SHORT = {
  IR:"McGGonicle", MN:"MANNY MEN", WG:"WITTnessing", MM:"Mike & Mike",
  AA:"All ARRAEZ", SP:"16 percent", JK:"Jung H King", SK:"Kwan",
  BB:"CY Young", TB:"Thicc Bois", DH:"Dom's House", RM:"Raleighing"
};

function mean(arr) {
  return arr.reduce((a, b) => a + b, 0) / arr.length;
}
function stddev(arr) {
  const m = mean(arr);
  return Math.sqrt(arr.reduce((s, x) => s + (x - m) ** 2, 0) / arr.length);
}

let sortCol = 'avg';
let sortDir = -1;
let currentTeams = [];
let chartInstance = null;

function renderTable() {
  const sorted = [...currentTeams].sort((a, b) => {
    const av = a[sortCol], bv = b[sortCol];
    if (typeof av === 'string') return sortDir * av.localeCompare(bv);
    return sortDir * (av - bv);
  });
  document.getElementById('rankBody').innerHTML = sorted.map(t => `
    <tr>
      <td><div class="team-cell"><span class="dot" style="background:${t.color}"></span>${t.name}</div></td>
      <td class="num">${t.avg.toFixed(1)}</td>
      <td class="num">${t.std.toFixed(1)}</td>
      <td class="cv">${t.cv.toFixed(1)}%</td>
      <td class="num">${t.wins}</td>
    </tr>
  `).join('');
}

document.querySelectorAll('thead th').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (sortCol === col) { sortDir *= -1; }
    else { sortCol = col; sortDir = col === 'name' ? 1 : -1; }
    document.querySelectorAll('thead th').forEach(h => h.classList.remove('sorted', 'asc'));
    th.classList.add('sorted');
    if (sortDir === 1) th.classList.add('asc');
    renderTable();
  });
});

function render(data) {
  const TEAMS = Object.entries(data.teams).map(([key, t]) => ({
    ...t,
    short: SHORT[key] || key
  }));

  TEAMS.forEach(t => {
    t.avg = mean(t.scores);
    t.std = stddev(t.scores);
    t.cv  = t.std / t.avg * 100;
  });

  const leagueMeanAvg = mean(TEAMS.map(t => t.avg));
  const leagueMeanStd = mean(TEAMS.map(t => t.std));

  const datasets = TEAMS.map(t => ({
    label: t.short,
    data: [{ x: t.avg, y: t.std, r: 5 + t.wins * 2.5 }],
    backgroundColor: t.color + 'cc',
    borderColor: t.color,
    borderWidth: 1.5,
    hoverBackgroundColor: t.color,
  }));

  const quadrantPlugin = {
    id: 'quadrantPlugin',
    afterDatasetsDraw(chart) {
      const { ctx, chartArea: { left, right, top, bottom }, scales } = chart;
      const cx = scales.x.getPixelForValue(leagueMeanAvg);
      const cy = scales.y.getPixelForValue(leagueMeanStd);
      ctx.save();
      ctx.setLineDash([5, 5]);
      ctx.strokeStyle = 'rgba(255,255,255,0.12)';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(cx, top); ctx.lineTo(cx, bottom); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(left, cy); ctx.lineTo(right, cy); ctx.stroke();
      ctx.setLineDash([]);
      ctx.font = '600 12px "Segoe UI", system-ui, sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.13)';
      ctx.textAlign = 'center';
      const pad = 10;
      ctx.fillText('Boom/Bust Elite',   (cx + right) / 2, top + pad + 14);
      ctx.fillText('Boom/Bust Weak',    (left + cx)  / 2, top + pad + 14);
      ctx.fillText('Consistent Elite',  (cx + right) / 2, bottom - pad - 4);
      ctx.fillText('Consistent Weak',   (left + cx)  / 2, bottom - pad - 4);
      ctx.restore();
    },
    afterDraw(chart) {
      const { ctx, scales } = chart;
      ctx.save();
      ctx.font = '600 10px "Segoe UI", system-ui, sans-serif';
      ctx.textBaseline = 'middle';
      TEAMS.forEach(t => {
        const px = scales.x.getPixelForValue(t.avg);
        const py = scales.y.getPixelForValue(t.std);
        const r  = 5 + t.wins * 2.5;
        let lx = px + r + 5;
        const tw = ctx.measureText(t.short).width;
        if (lx + tw > scales.x.right - 4) { lx = px - r - 5; ctx.textAlign = 'right'; }
        else { ctx.textAlign = 'left'; }
        ctx.shadowColor = '#0a0a1a'; ctx.shadowBlur = 4;
        ctx.fillStyle = t.color;
        ctx.fillText(t.short, lx, py);
        ctx.shadowBlur = 0;
      });
      ctx.restore();
    }
  };

  if (chartInstance) chartInstance.destroy();
  const ctx = document.getElementById('consistencyChart').getContext('2d');
  chartInstance = new Chart(ctx, {
    type: 'bubble',
    data: { datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 600, easing: 'easeOutQuart' },
      layout: { padding: { top: 10, right: 20, bottom: 10, left: 10 } },
      scales: {
        x: {
          title: { display: true, text: 'Avg Score / Week', color: '#94a3b8', font: { size: 12, weight: '600' } },
          grid: { color: 'rgba(255,255,255,0.06)' },
          ticks: { color: '#94a3b8', font: { size: 11 } },
          border: { color: 'rgba(255,255,255,0.1)' },
        },
        y: {
          title: { display: true, text: 'Std Dev — higher = more volatile', color: '#94a3b8', font: { size: 12, weight: '600' } },
          grid: { color: 'rgba(255,255,255,0.06)' },
          ticks: { color: '#94a3b8', font: { size: 11 } },
          border: { color: 'rgba(255,255,255,0.1)' },
        },
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#0f172a',
          borderColor: 'rgba(255,255,255,0.15)',
          borderWidth: 1,
          titleColor: '#f1f5f9',
          bodyColor: '#94a3b8',
          padding: 12,
          callbacks: {
            title(items) {
              const idx = datasets.findIndex(d => d.label === items[0].dataset.label);
              return TEAMS[idx].name;
            },
            label(item) {
              const idx = datasets.findIndex(d => d.label === item.dataset.label);
              const t = TEAMS[idx];
              return [`Avg/Week: ${t.avg.toFixed(1)}`, `Std Dev:  ${t.std.toFixed(1)}`, `Wins: ${t.wins}`];
            },
          },
        },
      },
    },
    plugins: [quadrantPlugin],
  });

  currentTeams = TEAMS;
  renderTable();
}

fetch('live_data.json').then(r => r.json()).then(render);

function downloadPng() {
  html2canvas(document.getElementById('chartCard'), {
    backgroundColor: '#16213e', scale: 2, useCORS: true,
  }).then(canvas => {
    const link = document.createElement('a');
    link.download = 'vista-hills-consistency-2026.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  });
}
</script>
</body>
</html>
