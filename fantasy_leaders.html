<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vista Hills — Category Kings &amp; Doormats (2026)</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      color: #eee;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      padding: 28px 20px 56px;
    }

    .page-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .page-header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: #fff;
    }
    .page-header p {
      margin-top: 6px;
      color: #aaa;
      font-size: 0.92rem;
    }

    /* Two-column layout */
    .tables-row {
      display: flex;
      gap: 20px;
      max-width: 1100px;
      margin: 0 auto;
      align-items: flex-start;
    }
    @media (max-width: 750px) {
      .tables-row { flex-direction: column; }
    }

    .table-panel {
      flex: 1;
      background: #16213e;
      border-radius: 14px;
      padding: 20px 18px 24px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
      overflow-x: auto;
      min-width: 0;
    }

    .panel-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      padding-bottom: 12px;
      border-bottom: 2px solid;
    }
    .kings-panel  .panel-header { border-color: #16a34a; }
    .doormats-panel .panel-header { border-color: #9f1239; }

    .panel-header h2 {
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.01em;
    }
    .kings-panel  .panel-header h2 { color: #4ade80; }
    .doormats-panel .panel-header h2 { color: #fb7185; }

    /* Tables */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
    }

    thead th {
      background: #0f172a;
      color: #64748b;
      font-weight: 600;
      padding: 8px 10px;
      text-align: left;
      white-space: nowrap;
      border-bottom: 1px solid #1e293b;
    }
    thead th.th-pts { text-align: right; }

    /* Group header rows */
    tr.group-header td {
      background: #0d1b33;
      color: #475569;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 5px 10px;
      border-top: 2px solid #1e293b;
      border-bottom: 1px solid #1e2d4a;
    }

    tbody tr.data-row {
      border-bottom: 1px solid #1e2d4a;
      transition: background 0.12s;
    }
    tbody tr.data-row:hover { background: rgba(255,255,255,0.045); }
    tbody tr.data-row:nth-child(even) { background: rgba(255,255,255,0.02); }
    tbody tr.data-row:nth-child(even):hover { background: rgba(255,255,255,0.05); }

    td { padding: 8px 10px; vertical-align: middle; }

    .cat-cell {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .cat-label {
      font-weight: 700;
      color: #e2e8f0;
      font-size: 0.83rem;
    }
    .cat-desc {
      font-size: 0.72rem;
      color: #64748b;
    }

    .team-cell {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 120px;
    }
    .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .team-name { font-size: 0.81rem; color: #e2e8f0; line-height: 1.3; }

    .pts-cell {
      text-align: right;
      font-variant-numeric: tabular-nums;
      font-weight: 700;
      white-space: nowrap;
      font-size: 0.85rem;
    }
    .pts-pos { color: #4ade80; }
    .pts-neg { color: #fb7185; }

    /* Fun doormats badge */
    .doormat-badge {
      display: inline-block;
      font-size: 0.68rem;
      background: rgba(159,18,57,0.25);
      color: #fda4af;
      border-radius: 4px;
      padding: 1px 5px;
      margin-left: 4px;
      vertical-align: middle;
    }
    a.back-link { color: #557b9d; font-size: 12px; text-decoration: none; margin-bottom: 16px; display: inline-block; }
  a.back-link:hover { color: #60a5fa; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Back to Vista Hills</a>



<div class="page-header">
  <h1>Vista Hills — Category Kings &amp; Doormats (2026)</h1>
  <p id="subtitle">Best and worst team in each scoring category</p>
</div>

<div class="tables-row">
  <div class="table-panel kings-panel" id="kingsPanel">
    <div class="panel-header">
      <h2>👑 Category Kings</h2>
    </div>
    <table id="kingsTable">
      <thead>
        <tr>
          <th>Category</th>
          <th>Team</th>
          <th class="th-pts">Points</th>
        </tr>
      </thead>
      <tbody id="kingsTbody"></tbody>
    </table>
  </div>

  <div class="table-panel doormats-panel" id="doormatsPanel">
    <div class="panel-header">
      <h2>🪣 Category Doormats</h2>
    </div>
    <table id="doormatsTable">
      <thead>
        <tr>
          <th>Category</th>
          <th>Team</th>
          <th class="th-pts">Points</th>
        </tr>
      </thead>
      <tbody id="doormatsTbody"></tbody>
    </table>
  </div>
</div>

<script>
const COLS = [
  { id:'r',   label:'R',     mult:1,    group:'bat+', desc:'Runs' },
  { id:'s',   label:'1B',    mult:1,    group:'bat+', desc:'Singles' },
  { id:'d',   label:'2B',    mult:2,    group:'bat+', desc:'Doubles' },
  { id:'t',   label:'3B',    mult:3,    group:'bat+', desc:'Triples' },
  { id:'hr',  label:'HR',    mult:4,    group:'bat+', desc:'Home Runs' },
  { id:'rbi', label:'RBI',   mult:2,    group:'bat+', desc:'RBI' },
  { id:'gw',  label:'GWRBI', mult:1,    group:'bat+', desc:'GWRBI' },
  { id:'bbB', label:'BB',    mult:1,    group:'bat+', desc:'Walks (Bat)' },
  { id:'hbp', label:'HBP',   mult:1,    group:'bat+', desc:'Hit by Pitch' },
  { id:'sac', label:'SAC',   mult:1,    group:'bat+', desc:'Sacrifices' },
  { id:'sb',  label:'SB',    mult:2,    group:'bat+', desc:'Stolen Bases' },
  { id:'kB',  label:'K',     mult:-1,   group:'bat-', desc:'Batter Strikeouts' },
  { id:'cs',  label:'CS',    mult:-0.5, group:'bat-', desc:'Caught Stealing' },
  { id:'ip',  label:'IP',    mult:3,    group:'pit+', desc:'Innings Pitched' },
  { id:'kP',  label:'K',     mult:1,    group:'pit+', desc:'Pitcher Strikeouts' },
  { id:'qs',  label:'QS',    mult:2,    group:'pit+', desc:'Quality Starts' },
  { id:'so',  label:'SHO',   mult:3,    group:'pit+', desc:'Shutouts' },
  { id:'w',   label:'W',     mult:8,    group:'pit+', desc:'Wins' },
  { id:'sv',  label:'SV',    mult:4.5,  group:'pit+', desc:'Saves' },
  { id:'hd',  label:'HD',    mult:2,    group:'pit+', desc:'Holds' },
  { id:'hP',  label:'H',     mult:-1,   group:'pit-', desc:'Hits Allowed' },
  { id:'er',  label:'ER',    mult:-2,   group:'pit-', desc:'Earned Runs' },
  { id:'bbP', label:'BB',    mult:-1,   group:'pit-', desc:'Walks Issued' },
  { id:'hb',  label:'HB',    mult:-1,   group:'pit-', desc:'Hit Batters' },
  { id:'l',   label:'L',     mult:-2,   group:'pit-', desc:'Losses' },
  { id:'bs',  label:'BS',    mult:-2,   group:'pit-', desc:'Blown Saves' },
];

let RAW = [];

// Doormat flavor text per category
const DOORMAT_QUIPS = {
  r:   '🐢 Hasn\'t scored since last week',
  s:   '🪵 Singles? More like "outtles"',
  d:   '📏 Can\'t even go the extra base',
  t:   '🌵 Triples are a myth here',
  hr:  '⚾ Baseballs leaving at a leisurely pace',
  rbi: '🙈 RBI-less in Seattle',
  gw:  '🤷 "What\'s a GWRBI?"',
  bbB: '👀 Swinging at everything',
  hbp: '🎯 Hasn\'t been hit lately',
  sac: '🐑 No sacrifice, no glory',
  sb:  '🪑 Sitting on the basepaths',
  kB:  '💨 Fanning the most',
  cs:  '🚨 Worst baserunner',
  ip:  '⏱️ Check-in early, leave early',
  kP:  '🫧 Strikeouts? We\'ve heard of them',
  qs:  '📉 Quality is debatable',
  so:  '🙃 A shutout? LOL',
  w:   '🧸 Participation award only',
  sv:  '🔥 Saves? More like "watch it burn"',
  hd:  '🕳️ Holds? Holding nothing',
  hP:  '🗑️ Giving out hits like candy',
  er:  '🏌️ ERA approaching Jupiter',
  bbP: '🚶 Free passes for everyone',
  hb:  '🩹 Beaning the whole lineup',
  l:   '📝 L after L after L',
  bs:  '💣 Blown saves connoisseur',
};

// categoryPoints[col.id][teamIdx] = points value — populated in fetch callback
const categoryPoints = {};

// Group order and labels
const GROUP_META = {
  'bat+': { label: 'Batting — Positive', emoji: '🏏' },
  'bat-': { label: 'Batting — Negative', emoji: '😬' },
  'pit+': { label: 'Pitching — Positive', emoji: '⚾' },
  'pit-': { label: 'Pitching — Negative', emoji: '🔥' },
};
const GROUP_ORDER = ['bat+', 'bat-', 'pit+', 'pit-'];

function fmtPts(val) {
  const rounded = Math.round(val * 10) / 10;
  const sign = rounded >= 0 ? '+' : '';
  return sign + rounded.toFixed(1);
}

function buildTable(tbodyId, mode) {
  // mode: 'king' = argmax, 'doormat' = argmin
  const tbody = document.getElementById(tbodyId);
  let html = '';
  let lastGroup = null;

  COLS.forEach(col => {
    if (col.group !== lastGroup) {
      const meta = GROUP_META[col.group];
      html += `<tr class="group-header"><td colspan="3">${meta.emoji} ${meta.label}</td></tr>`;
      lastGroup = col.group;
    }

    const pts = categoryPoints[col.id];
    let idx;
    if (mode === 'king') {
      idx = pts.indexOf(Math.max(...pts));
    } else {
      idx = pts.indexOf(Math.min(...pts));
    }

    const team = RAW[idx];
    const val  = pts[idx];
    const isPos = val >= 0;
    const ptsClass = isPos ? 'pts-pos' : 'pts-neg';

    let teamNameHtml = `<span class="team-name">${team.name}</span>`;
    if (mode === 'doormat') {
      const quip = DOORMAT_QUIPS[col.id] || '';
      teamNameHtml += quip ? `<span class="doormat-badge">${quip}</span>` : '';
    }

    html += `
      <tr class="data-row">
        <td>
          <div class="cat-cell">
            <span class="cat-label">${col.label}</span>
            <span class="cat-desc">${col.desc}</span>
          </div>
        </td>
        <td>
          <div class="team-cell">
            <span class="dot" style="background:${team.color}"></span>
            ${teamNameHtml}
          </div>
        </td>
        <td class="pts-cell ${ptsClass}">${fmtPts(val)}</td>
      </tr>
    `;
  });

  tbody.innerHTML = html;
}

fetch('live_data.json').then(r => r.json()).then(liveData => {
  document.getElementById('subtitle').textContent =
    `Best and worst team in each scoring category · Updated ${liveData.updated}`;

  const catStats = liveData.catStats || {};
  const teams    = liveData.teams   || {};

  RAW = Object.entries(catStats).map(([key, cats]) => ({
    name:  teams[key]?.name  || key,
    color: teams[key]?.color || '#888',
    ...cats,
  }));

  // Re-compute categoryPoints with live RAW
  COLS.forEach(col => {
    categoryPoints[col.id] = RAW.map(team => (team[col.id] || 0) * col.mult);
  });

  buildTable('kingsTbody',    'king');
  buildTable('doormatsTbody', 'doormat');
});
</script>
</body>
</html>
